name: PR Description Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-description:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required PR sections
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request.body || '').toLowerCase();
            const requiredSections = [
              '## summary',
              '## related issues',
              '## change type',
              '## validation',
              '## checklist'
            ];

            const missing = requiredSections.filter((section) => !body.includes(section));

            if (missing.length > 0) {
              core.setFailed(
                `PR description is missing required sections: ${missing.join(', ')}. ` +
                'Please use the pull request template.'
              );
            }
