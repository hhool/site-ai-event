name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and pull requests
        uses: actions/stale@v9
        with:
          stale-issue-message: >-
            This issue has been automatically marked as stale because it has had no activity.
            It will be closed if no further activity occurs.
          stale-pr-message: >-
            This pull request has been automatically marked as stale because it has had no activity.
            It will be closed if no further activity occurs.
          close-issue-message: >-
            This issue was closed because it has been stale with no activity.
            Reopen if it is still relevant.
          close-pr-message: >-
            This pull request was closed because it has been stale with no activity.
            Reopen if it is still relevant.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: security,pinned
          exempt-pr-labels: security,pinned
          days-before-stale: 21
          days-before-close: 7
