version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
    groups:
      npm-minor-and-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
      - automated
